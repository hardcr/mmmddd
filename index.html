<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>METFOX · BOT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: black;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- matrix canvas (full bleed) ---- */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
      background: black;
    }

    /* ---- main card – glassy overlay ---- */
    .visit-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 28px 20px 36px;
      box-shadow: 0 20px 40px rgba(255, 0, 0, 0.18), 0 0 0 1px rgba(255, 0, 0, 0.15);
      border: 1px solid rgba(255, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- logo circle ---- */
    .logo-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: black;
      border: 3px solid #e60000;
      box-shadow: 0 0 25px rgba(230, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---- welcome sign ---- */
    .welcome-sign {
      color: #e60000;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-shadow: 0 0 12px #e60000, 0 0 30px #990000;
      margin-bottom: 28px;
      background: rgba(0,0,0,0.5);
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid rgba(230, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      text-align: center;
    }

    /* ---- box grid ---- */
    .box-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* base box – solid red, classic feel */
    .box {
      background: #b30000;
      background: linear-gradient(145deg, #cc0000, #990000);
      border-radius: 30px;
      padding: 14px 20px;
      box-shadow: 0 6px 0 #660000, 0 10px 20px rgba(255, 0, 0, 0.3);
      border: 1px solid #ff3333;
      transition: all 0.2s ease;
      cursor: pointer;
      color: white;
      font-weight: 600;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 0 #550000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .box:active {
      transform: scale(0.97);
      box-shadow: 0 2px 0 #660000;
    }
    .box-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .box-icon {
      font-size: 1.7rem;
      line-height: 1;
    }
    .expand-indicator {
      font-size: 1.8rem;
      font-weight: 300;
      opacity: 0.8;
      transition: transform 0.2s;
    }

    /* ---- expandable content ---- */
    .box-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.3s ease, margin 0.3s ease;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 20px;
      margin-top: 0;
      padding: 0 12px;
      color: #fff0f0;
      font-weight: 400;
      font-size: 1rem;
      text-shadow: none;
      letter-spacing: 0.3px;
      border-left: 2px solid #ff4444;
      border-right: 2px solid #ff4444;
      width: 100%;
      box-sizing: border-box;
    }
    .box-content-inner {
      padding: 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .box-content a {
      color: #ffaaaa;
      text-decoration: underline;
      font-weight: 500;
      word-break: break-all;
    }
    .box-content button.close-btn {
      align-self: flex-end;
      background: #660000;
      border: none;
      color: white;
      font-size: 1rem;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 0 #330000;
      transition: 0.1s ease;
      letter-spacing: 0.5px;
      border: 1px solid #aa3333;
      margin-top: 4px;
    }
    .box-content button.close-btn:active {
      transform: scale(0.94);
      box-shadow: 0 0px 0 #330000;
    }

    .box.expanded {
      box-shadow: 0 6px 0 #660000, 0 0 20px rgba(255, 0, 0, 0.6);
      border-color: #ff6666;
    }
    .box.expanded .expand-indicator {
      transform: rotate(45deg);
    }
    .box-content-open {
      max-height: 320px;
      padding: 4px 12px 12px;
      margin-top: 12px;
      border-bottom: 1px solid #cc3333;
    }

    /* ---- WORK textarea — official, highlighted ---- */
    .work-textarea {
      width: 100%;
      background: #1a0505;
      border: 2px solid #cc4444;
      border-radius: 16px;
      padding: 14px 16px;
      color: #ffdddd;
      font-size: 1rem;
      resize: vertical;
      min-height: 90px;
      font-family: 'Segoe UI', 'Courier New', monospace;
      outline: none;
      transition: 0.15s;
      box-shadow: 0 0 0 1px #aa3333, inset 0 0 8px rgba(200, 0, 0, 0.3);
      font-weight: 400;
      line-height: 1.5;
    }
    .work-textarea:focus {
      border-color: #ff6666;
      box-shadow: 0 0 18px #cc0000, inset 0 0 12px rgba(255, 0, 0, 0.2);
      background: #1f0808;
    }
    .work-textarea::placeholder {
      color: #bb7777;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    /* responsive */
    @media (max-width: 480px) {
      .visit-card {
        padding: 20px 14px 28px;
        border-radius: 36px;
      }
      .logo-circle {
        width: 90px;
        height: 90px;
      }
      .welcome-sign {
        font-size: 1rem;
        padding: 4px 14px;
        letter-spacing: 2px;
      }
      .box {
        font-size: 1.1rem;
        padding: 12px 16px;
      }
      .box-icon {
        font-size: 1.4rem;
      }
    }

    .visit-card * {
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <!-- Matrix Canvas -->
  <canvas id="matrixCanvas"></canvas>

  <!-- MAIN CARD -->
  <div class="visit-card">

    <!-- logo -->
    <div class="logo-circle">
      <img src="https://umbphotos.ag/images/21ef2433a8c899057453b8e522bdc4da.jpg" alt="METFOX">
    </div>

    <!-- welcome -->
    <div class="welcome-sign">WELCOME TO METFOX</div>

    <!-- 3 boxes -->
    <div class="box-grid">

      <!-- BOX 1: BOT  (fox emoji at start & end) -->
      <div class="box" id="boxBot">
        <span class="box-label">
          <span class="box-icon">🦊</span> BOT <span class="box-icon" style="margin-left:4px;">🦊</span>
        </span>
        <span class="expand-indicator">↗</span>
      </div>

      <!-- BOX 2: CONTACTS  (wizard + link) -->
      <div class="box" id="boxContacts">
        <span class="box-label">
          <span class="box-icon">🧙</span> CONTACTS
        </span>
        <span class="expand-indicator">+</span>
      </div>
      <div class="box-content" id="contactsContent">
        <div class="box-content-inner">
          <span>📬 contact: <a href="#" id="contactsLink">rutor topic (example.com)</a></span>
          <button class="close-btn" id="closeContacts">✕ close</button>
        </div>
      </div>

      <!-- BOX 3: WORK  (handshake + highlighted textarea) -->
      <div class="box" id="boxWork">
        <span class="box-label">
          <span class="box-icon">🤝</span> WORK
        </span>
        <span class="expand-indicator">+</span>
      </div>
      <div class="box-content" id="workContent">
        <div class="box-content-inner">
          <textarea class="work-textarea" placeholder="minimal deposit 500usd · minimal pay per adrs 25usd · trusted agent salary from 20k$ · contact element">minimal deposit 500usd / minimal pay per adrs 25usd / trusted agent salary from 20k$ / contact element</textarea>
          <button class="close-btn" id="closeWork">✕ close</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ----- MATRIX (letters: m e t f o x) -----
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      let width, height, columns, drops;
      const chars = ['m', 'e', 't', 'f', 'o', 'x'];
      const fontSize = 20;
      let animationFrame;
      const SPEED_FACTOR = 0.95;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        columns = Math.floor(width / fontSize);
        drops = new Array(columns).fill(1);
      }

      function drawMatrix() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#e60000';
        ctx.font = fontSize + 'px monospace';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 6;

        for (let i = 0; i < drops.length; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          ctx.fillText(char, x, y);
          if (Math.random() < SPEED_FACTOR) {
            drops[i]++;
          }
          if (y > height && Math.random() > 0.975) {
            drops[i] = 0;
          }
        }
        animationFrame = requestAnimationFrame(drawMatrix);
      }

      function startMatrix() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        resizeCanvas();
        drawMatrix();
      }
      window.addEventListener('resize', resizeCanvas);
      startMatrix();

      // ----- BOX 1: BOT (redirect) -----
      document.getElementById('boxBot').addEventListener('click', function() {
        window.location.href = 'https://t.me/metfoxabot';
      });

      // ----- BOX 2: CONTACTS (expand / collapse) -----
      const contactsBox = document.getElementById('boxContacts');
      const contactsContent = document.getElementById('contactsContent');
      const closeContacts = document.getElementById('closeContacts');
      const contactsLink = document.getElementById('contactsLink');

      function toggleContacts(expand) {
        if (expand) {
          contactsBox.classList.add('expanded');
          contactsContent.classList.add('box-content-open');
          contactsBox.querySelector('.expand-indicator').textContent = '✕';
        } else {
          contactsBox.classList.remove('expanded');
          contactsContent.classList.remove('box-content-open');
          contactsBox.querySelector('.expand-indicator').textContent = '+';
        }
      }

      contactsBox.addEventListener('click', function(e) {
        if (e.target.closest('.close-btn')) return;
        const isOpen = contactsContent.classList.contains('box-content-open');
        toggleContacts(!isOpen);
      });
      closeContacts.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleContacts(false);
      });
      contactsLink.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'https://example.com';
      });

      // ----- BOX 3: WORK (expand / collapse) -----
      const workBox = document.getElementById('boxWork');
      const workContent = document.getElementById('workContent');
      const closeWork = document.getElementById('closeWork');

      function toggleWork(expand) {
        if (expand) {
          workBox.classList.add('expanded');
          workContent.classList.add('box-content-open');
          workBox.querySelector('.expand-indicator').textContent = '✕';
        } else {
          workBox.classList.remove('expanded');
          workContent.classList.remove('box-content-open');
          workBox.querySelector('.expand-indicator').textContent = '+';
        }
      }

      workBox.addEventListener('click', function(e) {
        if (e.target.closest('.close-btn')) return;
        const isOpen = workContent.classList.contains('box-content-open');
        toggleWork(!isOpen);
      });
      closeWork.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleWork(false);
      });

      console.log('✅ METFOX redesigned: BOT, CONTACTS, WORK (handshake, fox, wizard)');
    })();
  </script>
</body>
</html>
